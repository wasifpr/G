<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Battle - Game Master Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: #333;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-app {
            background: white;
            width: 95%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Status & Messages */
        .status-board {
            background: #edf2f7;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .message-box {
            font-size: 18px;
            margin-bottom: 20px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .highlight {
            font-size: 24px;
            font-weight: bold;
            color: #d53f8c;
            margin: 0 5px;
        }

        /* --- GUESSER UI (VIRTUAL KEYBOARD) --- */
        .guesser-ui {
            display: none; /* Hidden until game starts */
            flex-direction: column;
        }

        .virtual-display {
            background: #e2e8f0;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            height: 50px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #2d3748;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .numpad button {
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation; /* Optimizes for fast mobile tapping */
        }

        .numpad button:active { transform: scale(0.95); background: #2d3748; }
        .numpad .btn-del { background: #718096; }
        .numpad .btn-submit { background: #3182ce; grid-column: span 2; }

        /* --- JUDGE UI (HIGH/LOW BUTTONS) --- */
        .judge-ui {
            display: none; /* Hidden by default */
            flex-direction: column;
            gap: 15px;
        }

        .judge-btn {
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        
        .judge-btn:active { transform: scale(0.98); }
        .btn-high { background: #e53e3e; } /* Red */
        .btn-low { background: #dd6b20; }  /* Orange */
        .btn-correct { background: #38a169; } /* Green */

        /* Setup UI */
        .btn-start {
            background: #38a169;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-app">
        <div class="status-board">
            <span>Min: <span id="min-val">1</span></span>
            <span>Max: <span id="max-val">100</span></span>
        </div>

        <div class="message-box" id="message">
            <b>Player 1:</b> Think of a secret number between 1 and 100.
        </div>

        <button class="btn-start" id="start-btn" onclick="startGame()">I have my number! Start Game</button>

        <div class="guesser-ui" id="guesser-ui">
            <div class="virtual-display" id="guess-display"></div>
            <div class="numpad">
                <button onclick="pressKey('1')">1</button>
                <button onclick="pressKey('2')">2</button>
                <button onclick="pressKey('3')">3</button>
                <button onclick="pressKey('4')">4</button>
                <button onclick="pressKey('5')">5</button>
                <button onclick="pressKey('6')">6</button>
                <button onclick="pressKey('7')">7</button>
                <button onclick="pressKey('8')">8</button>
                <button onclick="pressKey('9')">9</button>
                <button class="btn-del" onclick="deleteKey()">⌫</button>
                <button onclick="pressKey('0')">0</button>
                <button class="btn-submit" onclick="submitGuess()">GUESS</button>
            </div>
        </div>

        <div class="judge-ui" id="judge-ui">
            <button class="judge-btn btn-high" onclick="judgeGuess('high')">Too High ⬇️</button>
            <button class="judge-btn btn-low" onclick="judgeGuess('low')">Too Low ⬆️</button>
            <button class="judge-btn btn-correct" onclick="judgeGuess('correct')">Correct! 🎉</button>
        </div>

    </div>

    <script>
        // Game Variables
        let minRange = 1;
        let maxRange = 100;
        let currentGuessString = "";
        let pendingGuess = 0;

        // UI Elements
        const messageEl = document.getElementById("message");
        const startBtn = document.getElementById("start-btn");
        const guesserUi = document.getElementById("guesser-ui");
        const judgeUi = document.getElementById("judge-ui");
        const displayEl = document.getElementById("guess-display");
        const minValEl = document.getElementById("min-val");
        const maxValEl = document.getElementById("max-val");

        // Start the game
        function startGame() {
            minRange = 1;
            maxRange = 100;
            updateBoard();
            
            startBtn.style.display = "none";
            switchToGuesserTurn();
        }

        function updateBoard() {
            minValEl.innerText = minRange;
            maxValEl.innerText = maxRange;
        }

        // --- PLAYER 2: VIRTUAL KEYBOARD LOGIC ---
        function pressKey(num) {
            if (currentGuessString.length < 3) { // Prevent typing numbers longer than 3 digits
                currentGuessString += num;
                displayEl.innerText = currentGuessString;
            }
        }

        function deleteKey() {
            currentGuessString = currentGuessString.slice(0, -1);
            displayEl.innerText = currentGuessString;
        }

        function submitGuess() {
            if (currentGuessString === "") return;
            
            pendingGuess = parseInt(currentGuessString);
            
            // Validation
            if (pendingGuess < minRange || pendingGuess > maxRange) {
                alert(`Please guess a number between ${minRange} and ${maxRange}.`);
                currentGuessString = "";
                displayEl.innerText = "";
                return;
            }

            // Switch UI to Player 1 (The Judge)
            switchToJudgeTurn();
        }

        // --- PLAYER 1: JUDGE LOGIC ---
        function judgeGuess(feedback) {
            if (feedback === 'high') {
                maxRange = pendingGuess - 1;
                switchToGuesserTurn(`Player 1 says ${pendingGuess} is <b>TOO HIGH</b>.`);
            } 
            else if (feedback === 'low') {
                minRange = pendingGuess + 1;
                switchToGuesserTurn(`Player 1 says ${pendingGuess} is <b>TOO LOW</b>.`);
            } 
            else if (feedback === 'correct') {
                endGameWin();
            }
        }

        // --- UI SWITCHING HELPERS ---
        function switchToGuesserTurn(optionalPrefix = "") {
            guesserUi.style.display = "flex";
            judgeUi.style.display = "none";
            currentGuessString = "";
            displayEl.innerText = "";
            updateBoard();

            // Catch contradiction cheating!
            if (minRange > maxRange) {
                messageEl.innerHTML = "<b>Player 1 cheated!</b> The hints contradict each other. Game Over.";
                guesserUi.style.display = "none";
                startBtn.style.display = "block";
                startBtn.innerText = "Restart Game";
                return;
            }

            messageEl.innerHTML = `${optionalPrefix}<br><b>Player 2:</b> Enter your guess!`;
        }

        function switchToJudgeTurn() {
            guesserUi.style.display = "none";
            judgeUi.style.display = "flex";
            messageEl.innerHTML = `Player 2 guessed: <span class="highlight">${pendingGuess}</span><br><b>Player 1:</b> Is this correct?`;
        }

        function endGameWin() {
            judgeUi.style.display = "none";
            messageEl.innerHTML = `🎉 <b>PLAYER 2 WINS!</b> 🎉<br>The secret number was <span class="highlight">${pendingGuess}</span>!`;
            startBtn.style.display = "block";
            startBtn.innerText = "Play Again";
        }
    </script>
</body>
</html>
