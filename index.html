<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Number Duel</title>
    <style>
        /* --- CSS: VISUALS & MOBILE POLISH --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            color: #333; overflow: hidden; touch-action: manipulation;
        }

        .game-card {
            background-color: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); text-align: center;
            max-width: 400px; width: 85%; z-index: 10; position: relative;
        }

        .shake { animation: shake-anim 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake-anim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .emoji-display { font-size: 60px; margin-bottom: 5px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .speech-bubble {
            background: #f0f4f8; border-radius: 15px; padding: 15px; margin-bottom: 20px;
            position: relative; font-size: 16px; line-height: 1.4; min-height: 60px;
        }
        .speech-bubble::after {
            content: ''; position: absolute; top: -10px; left: 50%; margin-left: -10px;
            border-width: 0 10px 10px; border-style: solid; border-color: #f0f4f8 transparent;
        }

        .status-board {
            display: none; justify-content: space-between; gap: 10px; margin-bottom: 20px;
        }
        .tracker-box {
            flex: 1; background: #edf2f7; padding: 10px; border-radius: 10px;
            border: 2px dashed #cbd5e0; font-size: 13px; font-weight: bold; transition: 0.3s;
        }
        .tracker-box span { display: block; color: #4a5568; margin-top: 5px; font-size: 15px; }
        .last-guess { font-size: 11px; color: #718096; margin-top: 8px; font-weight: normal; }

        .active-tracker { background-color: #ebf8ff; border-color: #4299e1; transform: scale(1.05); }

        .setup, .player-input-area, .feedback-controls, .post-game {
            display: flex; flex-direction: column; gap: 12px;
        }
        .player-input-area, .feedback-controls, .post-game { display: none; }

        select, input[type="number"] {
            padding: 12px; font-size: 16px; border-radius: 10px; border: 2px solid #cbd5e0;
            outline: none; text-align: center; width: 100%; box-sizing: border-box; -webkit-appearance: none;
        }

        button {
            border: none; border-radius: 10px; padding: 12px 20px; font-size: 16px;
            font-weight: bold; cursor: pointer; color: white; touch-action: manipulation; transition: 0.1s;
        }
        button:active { transform: scale(0.95); }

        .btn-start { background-color: #2b6cb0; width: 100%; font-size: 18px; padding: 15px; }
        .btn-guess { background-color: #e53e3e; }
        .btn-higher { background-color: #3182ce; flex: 1; }
        .btn-lower { background-color: #e53e3e; flex: 1; }
        .btn-correct { background-color: #38a169; width: 100%; margin-top: 10px; }
        .btn-replay { background-color: #4a5568; width: 100%; font-size: 18px; padding: 15px; }

        .btn-row { display: flex; gap: 10px; flex-direction: column; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex-grow: 1; }

        .number-highlight { font-size: 22px; font-weight: bold; color: #d53f8c; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div class="game-card" id="game-card">

        <div class="emoji-display" id="emoji-display">⚔️</div>
        <div class="speech-bubble" id="message">
            The Ultimate Duel! Choose my intelligence level, then think of a secret number (1-100).
        </div>

        <div class="status-board" id="status-board">
            <div class="tracker-box" id="robot-tracker">
                🤖 Robot's Num
                <span id="robot-bounds">1 - 100</span>
                <div class="last-guess" id="last-player-guess">Last Guess: --</div>
            </div>
            <div class="tracker-box" id="player-tracker">
                🧑 Your Num
                <span id="player-bounds">1 - 100</span>
                <div class="last-guess" id="last-robot-guess">Last Guess: --</div>
            </div>
        </div>

        <div class="setup" id="setup-controls">
            <select id="ai-mode">
                <option value="random">Easy AI: Randomizer</option>
                <option value="binary" selected>Normal AI: Binary Search</option>
                <option value="complex">Hard AI: Complex / Golden Ratio</option>
            </select>
            <button class="btn-start" onclick="startGame()">I have my number. Start Duel!</button>
        </div>

        <div class="player-input-area" id="player-input-area">
            <div class="input-group">
                <input type="number" id="player-guess" placeholder="Guess my number..." pattern="\d*">
                <button class="btn-guess" onclick="submitPlayerGuess()">FIRE!</button>
            </div>
        </div>

        <div class="feedback-controls" id="feedback-controls">
            <div class="btn-row">
                <button class="btn-higher" onclick="giveFeedback('higher')">My number is HIGHER ⬆️</button>
                <button class="btn-lower" onclick="giveFeedback('lower')">My number is LOWER ⬇️</button>
            </div>
            <button class="btn-correct" onclick="giveFeedback('correct')">That is Correct! 🎉</button>
        </div>

        <div class="post-game" id="post-game-controls">
            <button class="btn-replay" onclick="resetGameUI()">Play Again</button>
        </div>

    </div>

    <script>
        let robotSecretNumber;
        let robotAiMode;

        let pLow = 1, pHigh = 100; // What the player is guessing between
        let rLow = 1, rHigh = 100; // What the robot is guessing between
        let currentRobotGuess = 0;

        const messageEl = document.getElementById('message');
        const setupControls = document.getElementById('setup-controls');
        const playerInputArea = document.getElementById('player-input-area');
        const feedbackControls = document.getElementById('feedback-controls');
        const postGameControls = document.getElementById('post-game-controls');
        const statusBoard = document.getElementById('status-board');
        const emojiDisplay = document.getElementById('emoji-display');
        const playerGuessInput = document.getElementById('player-guess');
        const gameCard = document.getElementById('game-card');

        const robotTracker = document.getElementById('robot-tracker');
        const playerTracker = document.getElementById('player-tracker');
        const robotBoundsDisplay = document.getElementById('robot-bounds');
        const playerBoundsDisplay = document.getElementById('player-bounds');
        const lastPlayerGuessDisplay = document.getElementById('last-player-guess');
        const lastRobotGuessDisplay = document.getElementById('last-robot-guess');

        function shakeScreen() {
            gameCard.classList.remove('shake'); void gameCard.offsetWidth; gameCard.classList.add('shake');
        }

        function updateBoard() {
            robotBoundsDisplay.innerText = `${pLow} - ${pHigh}`;
            playerBoundsDisplay.innerText = `${rLow} - ${rHigh}`;
        }

        function startGame() {
            robotAiMode = document.getElementById('ai-mode').value;
            robotSecretNumber = Math.floor(Math.random() * 100) + 1;

            console.log(`🤖 DEVELOPER MODE: The Robot's secret number is ${robotSecretNumber}`);
            window.history.replaceState(null, null, `#debug=${robotSecretNumber}`);

            pLow = 1; pHigh = 100; rLow = 1; rHigh = 100;
            lastPlayerGuessDisplay.innerText = "Last Guess: --";
            lastRobotGuessDisplay.innerText = "Last Guess: --";

            setupControls.style.display = 'none';
            postGameControls.style.display = 'none';
            statusBoard.style.display = 'flex';
            updateBoard();

            startPlayerTurn();
        }

        // --- PLAYER'S TURN ---
        function startPlayerTurn() {
            feedbackControls.style.display = 'none';
            robotTracker.classList.add('active-tracker');
            playerTracker.classList.remove('active-tracker');

            emojiDisplay.innerText = '🧑';
            messageEl.innerHTML = `<b>Your turn!</b><br>Try to guess my secret number!`;

            playerGuessInput.value = '';
            playerInputArea.style.display = 'flex';
            // Only auto-focus on desktop to avoid jarring mobile jumps
            if(window.innerWidth > 768) playerGuessInput.focus();
        }

        function submitPlayerGuess() {
            let guess = parseInt(playerGuessInput.value);
            playerGuessInput.blur();

            if (isNaN(guess) || guess < 1 || guess > 100) {
                shakeScreen(); messageEl.innerHTML = "Please guess a valid number between 1 and 100!"; return;
            }

            playerInputArea.style.display = 'none';
            lastPlayerGuessDisplay.innerText = `Last Guess: ${guess}`;

            if (guess === robotSecretNumber) {
                triggerWin("You", guess);
                return;
            }

            shakeScreen();
            if (guess > robotSecretNumber) {
                if (guess <= pHigh) pHigh = guess - 1;
                emojiDisplay.innerText = '🛡️';
                messageEl.innerHTML = `You guessed ${guess}... <b>TOO HIGH!</b><br><br>Now it's my turn.`;
            } else {
                if (guess >= pLow) pLow = guess + 1;
                emojiDisplay.innerText = '🛡️';
                messageEl.innerHTML = `You guessed ${guess}... <b>TOO LOW!</b><br><br>Now it's my turn.`;
            }

            updateBoard();
            setTimeout(startRobotTurn, 1500);
        }

        // --- ENTER KEY FIX ---
        playerGuessInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitPlayerGuess();
            }
        });

        // --- ROBOT'S TURN ---
        function calculateRobotGuess() {
            if (robotAiMode === 'random') {
                return Math.floor(Math.random() * (rHigh - rLow + 1)) + rLow;
            } else if (robotAiMode === 'binary') {
                return Math.floor((rLow + rHigh) / 2);
            } else if (robotAiMode === 'complex') {
                const traps = [69, 73, 42, 37, 7, 99, 88, 25, 75];
                for (let t of traps) {
                    if (t >= rLow && t <= rHigh && Math.random() > 0.4) return t;
                }
                let range = rHigh - rLow;
                return Math.random() > 0.5 ? rLow + Math.floor(range * 0.618) : rLow + Math.floor(range * 0.382);
            }
        }

        function startRobotTurn() {
            robotTracker.classList.remove('active-tracker');
            playerTracker.classList.add('active-tracker');

            emojiDisplay.innerText = '🧠';
            messageEl.innerHTML = "Calculating my search parameters...";

            setTimeout(() => {
                currentRobotGuess = calculateRobotGuess();
                lastRobotGuessDisplay.innerText = `Last Guess: ${currentRobotGuess}`;

                emojiDisplay.innerText = '🤖';
                messageEl.innerHTML = `Is your secret number... <br><span class="number-highlight">${currentRobotGuess}</span> ?`;

                feedbackControls.style.display = 'flex';
            }, 1000);
        }

        function giveFeedback(feedback) {
            if (feedback === 'correct') {
                feedbackControls.style.display = 'none';
                triggerWin("The Robot", currentRobotGuess);
                return;
            }

            let testRLow = rLow;
            let testRHigh = rHigh;

            // THE CORRECTED LOGIC: "My number is HIGHER/LOWER than your guess"
            if (feedback === 'higher') testRLow = currentRobotGuess + 1;
            else if (feedback === 'lower') testRHigh = currentRobotGuess - 1;

            if (testRLow > testRHigh || testRLow > 100 || testRHigh < 1) {
                shakeScreen();
                emojiDisplay.innerText = '🤨';
                let direction = feedback === 'higher' ? 'HIGHER' : 'LOWER';
                messageEl.innerHTML = `<b>Wait!</b> If your number is between ${rLow} and ${rHigh}, it mathematically can't be <b>${direction}</b> than ${currentRobotGuess}! <br><br>Try clicking the correct hint.`;
                return;
            }

            feedbackControls.style.display = 'none';
            rLow = testRLow;
            rHigh = testRHigh;

            updateBoard();
            emojiDisplay.innerText = '🤖';
            messageEl.innerHTML = `Got it. So your number is between ${rLow} and ${rHigh}.`;
            setTimeout(startPlayerTurn, 1200);
        }

        // --- WIN LOGIC & RESTART ---
        function triggerWin(winner, winningNumber) {
            startConfetti();
            playerTracker.classList.remove('active-tracker');
            robotTracker.classList.remove('active-tracker');

            emojiDisplay.innerText = winner === "You" ? '🎉' : '👑';

            if (winner === "You") {
                messageEl.innerHTML = `<b>YOU WIN!</b><br>You cracked my secret number <span class="number-highlight">${winningNumber}</span>!`;
            } else {
                messageEl.innerHTML = `<b>I WIN!</b><br>I successfully found your number <span class="number-highlight">${winningNumber}</span>!`;
            }

            window.history.replaceState(null, null, ' ');
            postGameControls.style.display = 'flex';
        }

        function resetGameUI() {
            statusBoard.style.display = 'none';
            postGameControls.style.display = 'none';
            playerInputArea.style.display = 'none';
            feedbackControls.style.display = 'none';

            emojiDisplay.innerText = '⚔️';
            messageEl.innerHTML = `The Ultimate Duel! Choose my intelligence level, then think of a secret number (1-100).`;
            setupControls.style.display = 'flex';
        }

        // --- CONFETTI ANIMATION ---
        const canvas = document.getElementById("confetti"); const ctx = canvas.getContext("2d");
        let particles = []; let confettiActive = false;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener("resize", resizeCanvas); resizeCanvas();

        function startConfetti() {
            confettiActive = true; particles = [];
            for (let i = 0; i < 150; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, r: Math.random() * 6 + 4, dx: Math.random() * 4 - 2, dy: Math.random() * 5 + 2, color: `hsl(${Math.random() * 360}, 100%, 50%)`, tilt: Math.random() * 10 - 10 });
            requestAnimationFrame(drawConfetti); setTimeout(() => { confettiActive = false; }, 4000);
        }
        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); let activeParticles = 0;
            particles.forEach((p) => { p.y += p.dy; p.x += p.dx; p.tilt += 0.1; if (p.y < canvas.height) activeParticles++;
                ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color; ctx.moveTo(p.x + p.tilt + p.r, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); ctx.stroke(); });
            if (activeParticles > 0 || confettiActive) requestAnimationFrame(drawConfetti); else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
