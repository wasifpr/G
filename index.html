<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ultimate Number Battle</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* CSS Variables */
    :root {
      --bg-color: #0f172a;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --text-color: #f8fafc;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-main: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      font-family: var(--font-main);
      background: radial-gradient(circle at center, #1e293b, #020617);
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #confetti {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    .glass {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    .hidden {
      display: none !important;
    }

    /* Modals & Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }

    .modal {
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      text-align: center;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal h2 {
      margin-bottom: 1rem;
      font-weight: 800;
      font-size: 2rem;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      color: transparent;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-family: var(--font-main);
      font-size: 1.1rem;
      text-align: center;
      outline: none;
    }

    .avatar-select {
      display: flex;
      justify-content: space-around;
      margin-bottom: 1.5rem;
    }

    .avatar-option {
      font-size: 2.5rem;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.2s;
    }

    .avatar-option.selected {
      opacity: 1;
      transform: scale(1.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: var(--font-main);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 0.5rem;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.success {
      background: var(--success);
    }

    .btn.warning {
      background: var(--warning);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Main Menu */
    #main-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(to right, #3b82f6, #ec4899);
      -webkit-background-clip: text;
      color: transparent;
    }

    .stats {
      font-size: 1rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }

    .menu-buttons {
      width: 100%;
      max-width: 350px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Game UI */
    #game-ui {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .player-avatar {
      font-size: 1.5rem;
    }

    .player-name {
      font-weight: 600;
    }

    .hp-bar {
      display: flex;
      gap: 2px;
      margin-top: 4px;
    }

    .hp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--glass-border);
    }

    .hp-dot.active {
      background: var(--danger);
      box-shadow: 0 0 5px var(--danger);
    }

    .hp-dot.active.p1 {
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
    }

    .battle-log {
      flex: 1;
      margin: 1rem 0;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .log-entry {
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      font-size: 0.95rem;
      animation: slideIn 0.2s ease-out;
    }

    .log-entry.system {
      color: var(--warning);
      text-align: center;
      background: none;
    }

    .log-entry.p1 {
      border-left: 4px solid var(--accent);
    }

    .log-entry.p2 {
      border-right: 4px solid var(--danger);
      text-align: right;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .controls-area {
      min-height: 250px;
    }

    /* Virtual Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .num-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 15px;
      font-size: 1.5rem;
      color: white;
      cursor: pointer;
      transition: background 0.1s;
    }

    .num-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .num-btn.span-2 {
      grid-column: span 2;
    }

    .num-btn.enter {
      background: var(--success);
      font-weight: bold;
    }

    .current-guess-display {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      height: 60px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    /* Judgment Controls (Reverse PvE / Host Feedback) */
    .judgment-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .judg-btn {
      padding: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      color: white;
      cursor: pointer;
    }

    .judg-btn.high {
      background: var(--danger);
    }

    .judg-btn.low {
      background: var(--accent);
    }

    .judg-btn.correct {
      background: var(--success);
      grid-column: span 2;
    }

    .shake {
      animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }

    /* Top actions (mute, exit) */
    .global-actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 10px;
      z-index: 40;
    }

    .icon-btn {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--glass-border);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
    }

    /* Setup Mode Views */
    #setup-mode,
    #online-lobby {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      height: 100%;
      justify-content: center;
      max-width: 400px;
      margin: 0 auto;
    }

    .code-display {
      font-size: 3rem;
      letter-spacing: 5px;
      font-weight: 800;
      text-align: center;
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
    }
  </style>
</head>

<body>

  <!-- Confetti Canvas -->
  <canvas id="confetti"></canvas>

  <!-- Global Actions -->
  <div class="global-actions">
    <button id="btn-mute" class="icon-btn">🔊</button>
  </div>

  <!-- Profile Setup Modal -->
  <div id="profile-modal" class="overlay">
    <div class="modal glass">
      <h2>Welcome Player</h2>
      <div class="avatar-select" id="avatar-select">
        <div class="avatar-option selected" data-avatar="🧑">🧑</div>
        <div class="avatar-option" data-avatar="🐱">🐱</div>
        <div class="avatar-option" data-avatar="🤖">🤖</div>
        <div class="avatar-option" data-avatar="👽">👽</div>
      </div>
      <input type="text" id="input-username" placeholder="Enter Username" maxlength="12">
      <button id="btn-save-profile" class="btn">Start Battle</button>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="main-menu">
    <div class="header">
      <h1>ULTIMATE<br>NUMBER<br>BATTLE</h1>
      <div class="stats" id="menu-stats">Wins: 0 Local | 0 Online</div>
    </div>
    <div class="menu-buttons">
      <button class="btn" onclick="Game.startSetup('pve')">Vs Bot (PvE)</button>
      <button class="btn warning" onclick="Game.startSetup('reverse-pve')">Reverse PvE</button>
      <button class="btn success" onclick="Game.startSetup('local-pvp')">Local PvP</button>
      <button class="btn danger" onclick="Game.startLobby()">Online PvP</button>
    </div>
  </div>

  <!-- PvE Setup -->
  <div id="setup-mode" class="hidden">
    <h2 style="text-align:center;margin-bottom:1rem;" id="setup-title">Setup Game</h2>
    <div id="ai-difficulty-select">
      <button class="btn" onclick="Game.startGame('pve', 'easy')">Easy AI</button>
      <button class="btn" onclick="Game.startGame('pve', 'normal')">Normal AI</button>
      <button class="btn" onclick="Game.startGame('pve', 'hard')">Hard AI</button>
      <button class="btn danger" onclick="Game.startGame('pve', 'expert')">Expert AI</button>
    </div>
    <button class="btn" onclick="UI.showMainMenu()" style="margin-top:2rem; background:gray;">Back to Menu</button>
  </div>

  <!-- Online Lobby -->
  <div id="online-lobby" class="hidden">
    <h2 style="text-align:center;">Online Multiplayer</h2>

    <div class="glass" style="padding:1.5rem; margin-top:1rem; text-align:center;">
      <h3>Host a Game</h3>
      <div class="code-display" id="host-code">----</div>
      <button id="btn-host" class="btn">Generate Code</button>
    </div>

    <div class="glass" style="padding:1.5rem; margin-top:1rem; text-align:center;">
      <h3>Join a Game</h3>
      <input type="text" id="input-join-code" placeholder="4-Letter Code"
        style="text-transform:uppercase; letter-spacing:2px; font-weight:bold;">
      <button id="btn-join" class="btn success">Join Game</button>
    </div>

    <div id="connection-status" style="text-align:center; margin-top:1rem; color:var(--warning);"></div>

    <button class="btn" onclick="Network.disconnect(); UI.showMainMenu()" style="margin-top:1rem; background:gray;">Back
      to Menu</button>
  </div>

  <!-- Game UI -->
  <div id="game-ui" class="hidden glass">
    <div class="top-bar">
      <div class="player-info p1">
        <div class="player-avatar" id="p1-avatar">🧑</div>
        <div>
          <div class="player-name" id="p1-name">Player 1</div>
          <div class="hp-bar" id="p1-hp"></div>
        </div>
      </div>
      <div style="font-weight:800; color:var(--warning);" id="turn-indicator">P1 TURN</div>
      <div class="player-info p2" style="flex-direction:row-reverse; text-align:right;">
        <div class="player-avatar" id="p2-avatar">🤖</div>
        <div>
          <div class="player-name" id="p2-name">Bot</div>
          <div class="hp-bar" id="p2-hp"></div>
        </div>
      </div>
    </div>

    <div class="battle-log" id="battle-log">
      <div class="log-entry system">Game Started! Target is between 1 and 100.</div>
    </div>

    <div class="controls-area">
      <!-- Numpad State -->
      <div id="input-numpad" class="">
        <div class="current-guess-display" id="current-guess">_</div>
        <div class="numpad">
          <button class="num-btn" onclick="UI.appendGuess(1)">1</button>
          <button class="num-btn" onclick="UI.appendGuess(2)">2</button>
          <button class="num-btn" onclick="UI.appendGuess(3)">3</button>
          <button class="num-btn" onclick="UI.appendGuess(4)">4</button>
          <button class="num-btn" onclick="UI.appendGuess(5)">5</button>
          <button class="num-btn" onclick="UI.appendGuess(6)">6</button>
          <button class="num-btn" onclick="UI.appendGuess(7)">7</button>
          <button class="num-btn" onclick="UI.appendGuess(8)">8</button>
          <button class="num-btn" onclick="UI.appendGuess(9)">9</button>
          <button class="num-btn" onclick="UI.clearGuess()">C</button>
          <button class="num-btn" onclick="UI.appendGuess(0)">0</button>
          <button class="num-btn enter" onclick="Game.submitGuess()">ENT</button>
        </div>
      </div>

      <!-- Judgment State -->
      <div id="input-judgment" class="hidden">
        <div style="text-align:center; font-size:1.2rem; margin-bottom:1rem;" id="judgment-prompt">Opponent Guessed: <b
            id="judgment-guess-val" style="font-size:2rem; color:var(--warning);">50</b></div>
        <div class="judgment-controls">
          <button class="judg-btn high" onclick="Game.submitFeedback('high')">Too High ⬇️</button>
          <button class="judg-btn low" onclick="Game.submitFeedback('low')">Too Low ⬆️</button>
          <button class="judg-btn correct" onclick="Game.submitFeedback('correct')">Correct ✅</button>
        </div>
      </div>

      <!-- Waiting State -->
      <div id="input-waiting" class="hidden"
        style="display:flex; justify-content:center; align-items:center; height:100%; font-size:1.5rem; color:#94a3b8;">
        Waiting for opponent...
      </div>
    </div>

    <div style="text-align:center; margin-top:10px;">
      <button class="btn" style="background:gray; width:auto; padding:5px 15px; font-size:0.9rem;"
        onclick="Game.quit()">Quit</button>
    </div>
  </div>


  <script>
    // --- AUDIO MANAGER ---
    const AudioMgr = {
      ctx: null,
      muted: false,
      init() {
        if (!this.ctx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) this.ctx = new AudioContext();
        }
      },
      playTone(freq, type, duration, vol = 0.1) {
        if (this.muted || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      },
      beep() { this.playTone(600, 'sine', 0.1, 0.1); },
      buzz() { this.playTone(150, 'sawtooth', 0.3, 0.2); },
      chime() {
        if (this.muted || !this.ctx) return;
        this.playTone(523.25, 'sine', 0.2, 0.1); // C5
        setTimeout(() => this.playTone(659.25, 'sine', 0.2, 0.1), 100); // E5
        setTimeout(() => this.playTone(783.99, 'sine', 0.4, 0.1), 200); // G5
      },
      toggleMute() {
        this.muted = !this.muted;
        Storage.saveMute(this.muted);
        document.getElementById('btn-mute').textContent = this.muted ? '🔇' : '🔊';
      }
    };

    // --- STORAGE MANAGER ---
    const Storage = {
      profile: { username: '', avatar: '🧑', localWins: 0, onlineWins: 0 },
      load() {
        const data = localStorage.getItem('unb_profile');
        if (data) this.profile = { ...this.profile, ...JSON.parse(data) };
        AudioMgr.muted = localStorage.getItem('unb_mute') === 'true';
        document.getElementById('btn-mute').textContent = AudioMgr.muted ? '🔇' : '🔊';
      },
      save() { localStorage.setItem('unb_profile', JSON.stringify(this.profile)); },
      saveMute(muted) { localStorage.setItem('unb_mute', muted); }
    };

    // --- NETWORK MANAGER (PEERJS) ---
    const Network = {
      peer: null,
      conn: null,
      isHost: false,
      generateCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        return Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      },
      initHost() {
        return new Promise((resolve) => {
          const code = this.generateCode();
          this.peer = new Peer('unb-' + code, { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
          this.isHost = true;
          this.peer.on('open', (id) => resolve(code));
          this.peer.on('connection', (c) => {
            if (this.conn) { c.close(); return; } // Only one connection
            this.conn = c;
            this.setupConnection();
          });
        });
      },
      joinGame(code) {
        return new Promise((resolve, reject) => {
          this.peer = new Peer({ config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });
          this.isHost = false;
          this.peer.on('open', () => {
            this.conn = this.peer.connect('unb-' + code.toUpperCase(), { reliable: true });
            this.conn.on('open', () => {
              this.setupConnection();
              resolve();
            });
            this.conn.on('error', reject);
          });
          this.peer.on('error', reject);
        });
      },
      setupConnection() {
        document.getElementById('connection-status').textContent = "Connected! Syncing...";
        this.conn.on('data', (data) => this.handleData(data));
        this.conn.on('close', () => {
          UI.logSystem("Opponent disconnected.");
          setTimeout(() => { if (Game.state !== 'menu') Game.quit(); }, 3000);
        });

        // Sync profile
        this.send({ type: 'SYNC_PROFILE', p: Storage.profile });
      },
      send(data) {
        if (this.conn && this.conn.open) {
          this.conn.send(data);
        }
      },
      handleData(data) {
        switch (data.type) {
          case 'SYNC_PROFILE':
            Game.p2Profile = data.p;
            if (this.isHost) {
              setTimeout(() => {
                Game.startGame('online-pvp');
              }, 1000);
            }
            break;
          case 'START_GAME':
            Game.onlineStart(data.turn);
            break;
          case 'GUESS':
            Game.handleGuess(data.guess, false);
            break;
          case 'JUDGMENT':
            Game.applyJudgment(data.fb, false);
            break;
        }
      },
      disconnect() {
        if (this.conn) this.conn.close();
        if (this.peer) this.peer.destroy();
        this.conn = null;
        this.peer = null;
      }
    };

    // --- AI ENGINE ---
    const AI = {
      makeGuess(min, max, diff) {
        if (min > max) return min; // fallback
        switch (diff) {
          case 'easy':
            return Math.floor(Math.random() * (max - min + 1)) + min;
          case 'normal':
            return Math.floor((min + max) / 2);
          case 'hard':
            return Math.floor(min + (max - min) * 0.618);
          case 'expert':
            const factor = 0.3 + (Math.random() * 0.4); // 30% to 70%
            return Math.floor(min + (max - min) * factor);
          default:
            return Math.floor((min + max) / 2);
        }
      }
    };

    // --- GAME CONTROLLER ---
    const Game = {
      state: 'menu',
      mode: '',
      difficulty: 'normal',
      turn: 1,
      phase: 'guess',
      p1Min: 1, p1Max: 100,
      p2Min: 1, p2Max: 100,
      p1HP: 7,
      p2HP: 7,
      p2Profile: { username: 'Bot', avatar: '🤖' },
      lastGuess: 0,
      botTarget: 0,

      startSetup(mode) {
        this.mode = mode;
        if (mode === 'pve' || mode === 'reverse-pve') {
          document.getElementById('setup-title').textContent = "Select Bot Difficulty";
          document.getElementById('ai-difficulty-select').classList.remove('hidden');
          UI.showScreen('setup-mode');
        } else if (mode === 'local-pvp') {
          this.p2Profile = { username: 'Player 2', avatar: '👽' };
          this.startGame('local-pvp');
        }
      },

      startLobby() {
        UI.showScreen('online-lobby');
        document.getElementById('connection-status').textContent = "";
        document.getElementById('host-code').textContent = "----";
        document.getElementById('input-join-code').value = "";
      },

      startGame(mode, diff = 'normal') {
        this.mode = mode;
        this.difficulty = diff;
        this.state = 'playing';
        this.turn = 1;
        this.phase = 'guess';
        this.p1Min = 1; this.p1Max = 100;
        this.p2Min = 1; this.p2Max = 100;
        this.p1HP = 7;
        this.p2HP = 7;
        this.currentGuessStr = '';
        this.lastGuess = 0;

        if (mode === 'pve') {
          this.p2Profile = { username: `Bot (${diff})`, avatar: '🤖' };
          this.botTarget = Math.floor(Math.random() * 100) + 1;
        } else if (mode === 'reverse-pve') {
          this.p2Profile = { username: `Bot (${diff})`, avatar: '🤖' };
          this.turn = 2; // Bot goes first
        } else if (mode === 'online-pvp') {
          Network.send({ type: 'START_GAME', turn: 2 }); // Tell client it's P2
        }

        UI.initGameUI();
        this.processTurn();
      },

      onlineStart(roleTurn) {
        this.mode = 'online-pvp';
        this.state = 'playing';
        this.turn = 1; // 1 is always current player local
        this.phase = 'guess';
        this.p1Min = 1; this.p1Max = 100;
        this.p2Min = 1; this.p2Max = 100;
        this.p1HP = 7;
        this.p2HP = 7;
        this.currentGuessStr = '';
        UI.initGameUI();
        this.processTurn(roleTurn);
      },

      processTurn(forceTurn = null) {
        if (forceTurn) this.turn = forceTurn;

        UI.updateTurnIndicator();

        if (this.phase === 'judge') {
           if (this.mode === 'pve') {
             if (this.turn === 1) {
                // P1 guessed, Bot auto-judges
                let fb = 'correct';
                if (this.lastGuess < this.botTarget) fb = 'low';
                else if (this.lastGuess > this.botTarget) fb = 'high';
                setTimeout(() => this.applyJudgment(fb, false), 500);
             } else {
                UI.setControlsState('judgment', this.lastGuess);
             }
           } else if (this.mode === 'reverse-pve') {
             UI.setControlsState('judgment', this.lastGuess);
           } else if (this.mode === 'local-pvp') {
             UI.setControlsState('judgment', this.lastGuess);
           } else if (this.mode === 'online-pvp') {
             if (this.turn === 1) UI.setControlsState('waiting');
             else UI.setControlsState('judgment', this.lastGuess);
           }
           return;
        }

        // phase == 'guess'
        if (this.mode === 'pve') {
          if (this.turn === 1) {
            UI.setControlsState('numpad');
            UI.clearGuess();
          } else {
            UI.setControlsState('waiting');
            setTimeout(() => {
              this.lastGuess = AI.makeGuess(this.p2Min, this.p2Max, this.difficulty);
              this.handleGuess(this.lastGuess, false);
            }, 1000);
          }
        } else if (this.mode === 'reverse-pve') {
          if (this.turn === 2) {
            UI.setControlsState('waiting');
            setTimeout(() => {
              this.lastGuess = AI.makeGuess(this.p2Min, this.p2Max, this.difficulty);
              this.handleGuess(this.lastGuess, false);
            }, 1000);
          }
        } else if (this.mode === 'local-pvp') {
          UI.setControlsState('numpad');
          UI.clearGuess();
        } else if (this.mode === 'online-pvp') {
          if (this.turn === 1) { // Local player turn
            UI.setControlsState('numpad');
            UI.clearGuess();
          } else {
            UI.setControlsState('waiting');
          }
        }
      },

      submitGuess() {
        if (this.currentGuessStr === '') return;
        let g = parseInt(this.currentGuessStr);
        if (g < 1 || g > 100) { UI.shake(); return; }

        if (this.mode === 'online-pvp') {
          Network.send({ type: 'GUESS', guess: g });
        }

        this.handleGuess(g, true);
      },

      handleGuess(g, isLocal) {
        AudioMgr.beep();
        this.lastGuess = g;
        let playerClass = isLocal ? 'p1' : 'p2';
        let playerName = isLocal ? Storage.profile.username : this.p2Profile.username;

        if (this.mode === 'local-pvp') {
          playerClass = this.turn === 1 ? 'p1' : 'p2';
          playerName = this.turn === 1 ? Storage.profile.username : this.p2Profile.username;
        }

        UI.logEntry(`${playerName} guesses ${g}`, playerClass);
        UI.clearGuess();

        this.phase = 'judge';

        let judgerName = Storage.profile.username;
        if (this.mode === 'local-pvp' && this.turn === 1) judgerName = this.p2Profile.username;
        else if (this.mode === 'pve' && this.turn === 1) judgerName = this.p2Profile.username;

        document.getElementById('judgment-prompt').innerHTML = `<b>${judgerName}</b>, is this correct?<br><span style="font-size:2rem; color:var(--warning);">${g}</span>`;

        this.processTurn();
      },

      submitFeedback(fb) {
        AudioMgr.beep();
        if (this.mode === 'online-pvp') {
          Network.send({ type: 'JUDGMENT', fb: fb });
        }
        this.applyJudgment(fb, true);
      },

      applyJudgment(fb, isLocal) {
        let currentGuesser = this.turn;
        let minB = currentGuesser === 1 ? this.p1Min : this.p2Min;
        let maxB = currentGuesser === 1 ? this.p1Max : this.p2Max;

        if (fb === 'low') {
          if (this.lastGuess >= maxB) {
             UI.logEntry("Contradiction! You can't go higher than max bound.", 'system');
             UI.shake();
             this.takeDamage(currentGuesser === 1 ? 2 : 1);
             if (this.state !== 'over') UI.setControlsState('judgment', this.lastGuess);
             return;
          }
          if (currentGuesser === 1) this.p1Min = Math.max(this.p1Min, this.lastGuess + 1);
          else this.p2Min = Math.max(this.p2Min, this.lastGuess + 1);
          UI.logEntry(`Target is higher than ${this.lastGuess}`, 'system');
          this.takeDamage(currentGuesser);
        } else if (fb === 'high') {
          if (this.lastGuess <= minB) {
             UI.logEntry("Contradiction! You can't go lower than min bound.", 'system');
             UI.shake();
             this.takeDamage(currentGuesser === 1 ? 2 : 1);
             if (this.state !== 'over') UI.setControlsState('judgment', this.lastGuess);
             return;
          }
          if (currentGuesser === 1) this.p1Max = Math.min(this.p1Max, this.lastGuess - 1);
          else this.p2Max = Math.min(this.p2Max, this.lastGuess - 1);
          UI.logEntry(`Target is lower than ${this.lastGuess}`, 'system');
          this.takeDamage(currentGuesser);
        } else if (fb === 'correct') {
          UI.logEntry(`Correct! Guessed the target!`, 'system');
          this.endGame(currentGuesser);
          return;
        }

        if (this.state === 'over') return;

        this.phase = 'guess';
        this.turn = this.turn === 1 ? 2 : 1;
        if (this.mode === 'reverse-pve') this.turn = 2;

        this.processTurn();
      },

      takeDamage(playerNum) {
        AudioMgr.buzz();
        UI.shake();
        if (playerNum === 1) {
          this.p1HP--;
          UI.renderHP();
          if (this.p1HP <= 0) this.endGame(2);
        } else {
          this.p2HP--;
          UI.renderHP();
          if (this.p2HP <= 0) this.endGame(1);
        }
      },

      endGame(winnerNum) {
        this.state = 'over';
        UI.setControlsState('waiting');
        let winName = winnerNum === 1 ? Storage.profile.username : this.p2Profile.username;

        if (winnerNum === 1) {
          AudioMgr.chime();
          UI.showConfetti();
          if (this.mode === 'online-pvp') Storage.profile.onlineWins++;
          else Storage.profile.localWins++;
          Storage.save();
        } else {
          AudioMgr.buzz();
        }

        UI.logEntry(`Game Over! ${winName} wins!`, 'system');
        UI.logEntry(`The target was ${this.targetNumber || this.lastGuess}`, 'system');

        setTimeout(() => {
          this.quit();
        }, 5000);
      },

      quit() {
        this.state = 'menu';
        if (this.mode === 'online-pvp') Network.disconnect();
        UI.showMainMenu();
      }
    };

    // --- UI MANAGER ---
    const UI = {
      screens: ['profile-modal', 'main-menu', 'setup-mode', 'online-lobby', 'game-ui'],

      init() {
        Storage.load();

        if (!Storage.profile.username) {
          this.showScreen('profile-modal');
        } else {
          this.showMainMenu();
        }

        // Avatar select logic
        document.querySelectorAll('.avatar-option').forEach(el => {
          el.addEventListener('click', (e) => {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            e.target.classList.add('selected');
            Storage.profile.avatar = e.target.dataset.avatar;
          });
        });

        // Save profile
        document.getElementById('btn-save-profile').addEventListener('click', () => {
          const name = document.getElementById('input-username').value.trim();
          if (name) {
            Storage.profile.username = name;
            Storage.save();
            AudioMgr.init(); // Init audio on first user interaction
            this.showMainMenu();
          }
        });

        // Mute button
        document.getElementById('btn-mute').addEventListener('click', () => {
          AudioMgr.init();
          AudioMgr.toggleMute();
        });

        // Network UI
        document.getElementById('btn-host').addEventListener('click', async () => {
          document.getElementById('btn-host').disabled = true;
          document.getElementById('host-code').textContent = "WAIT...";
          const code = await Network.initHost();
          document.getElementById('host-code').textContent = code;
          document.getElementById('connection-status').textContent = "Waiting for opponent...";
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
          const code = document.getElementById('input-join-code').value.trim();
          if (code.length === 4) {
            document.getElementById('btn-join').disabled = true;
            document.getElementById('connection-status').textContent = "Connecting...";
            try {
              await Network.joinGame(code);
            } catch (e) {
              document.getElementById('connection-status').textContent = "Connection Failed.";
              document.getElementById('btn-join').disabled = false;
            }
          }
        });

        // Keyboard listeners
        window.addEventListener('keydown', (e) => {
          if (Game.state !== 'playing' || document.getElementById('input-numpad').classList.contains('hidden')) {
            // URL cipher easter egg
            this.handleEasterEgg(e.key);
            return;
          }
          if (e.key >= '0' && e.key <= '9') {
            this.appendGuess(e.key);
          } else if (e.key === 'Backspace') {
            Game.currentGuessStr = Game.currentGuessStr.slice(0, -1);
            this.updateGuessDisplay();
          } else if (e.key === 'Enter') {
            Game.submitGuess();
          }
        });
      },

      showScreen(id) {
        this.screens.forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
      },

      showMainMenu() {
        document.getElementById('menu-stats').textContent = `Wins: ${Storage.profile.localWins} Local | ${Storage.profile.onlineWins} Online`;
        this.showScreen('main-menu');
      },

      initGameUI() {
        this.showScreen('game-ui');
        document.getElementById('p1-name').textContent = Storage.profile.username;
        document.getElementById('p1-avatar').textContent = Storage.profile.avatar;
        document.getElementById('p2-name').textContent = Game.p2Profile.username;
        document.getElementById('p2-avatar').textContent = Game.p2Profile.avatar;
        document.getElementById('battle-log').innerHTML = '<div class="log-entry system">Game Started! Target is 1-100.</div>';
        this.renderHP();
        this.clearGuess();
      },

      renderHP() {
        let p1HTML = '';
        for (let i = 0; i < 7; i++) p1HTML += `<div class="hp-dot ${i < Game.p1HP ? 'active p1' : ''}"></div>`;
        document.getElementById('p1-hp').innerHTML = p1HTML;

        let p2HTML = '';
        for (let i = 0; i < 7; i++) p2HTML += `<div class="hp-dot ${i < Game.p2HP ? 'active' : ''}"></div>`;
        document.getElementById('p2-hp').innerHTML = p2HTML;
      },

      updateTurnIndicator() {
        const ind = document.getElementById('turn-indicator');
        if (Game.mode === 'local-pvp') {
          ind.textContent = Game.turn === 1 ? 'P1 TURN' : 'P2 TURN';
          ind.style.color = Game.turn === 1 ? 'var(--accent)' : 'var(--danger)';
        } else {
          ind.textContent = Game.turn === 1 ? 'YOUR TURN' : 'OPPONENT TURN';
          ind.style.color = Game.turn === 1 ? 'var(--accent)' : 'var(--danger)';
        }
      },

      appendGuess(num) {
        if (Game.currentGuessStr.length < 3) {
          Game.currentGuessStr += num;
          this.updateGuessDisplay();
        }
      },
      clearGuess() {
        Game.currentGuessStr = '';
        this.updateGuessDisplay();
      },
      updateGuessDisplay() {
        document.getElementById('current-guess').textContent = Game.currentGuessStr || '_';
      },

      setControlsState(state, val = null) {
        document.getElementById('input-numpad').classList.add('hidden');
        document.getElementById('input-judgment').classList.add('hidden');
        document.getElementById('input-waiting').classList.add('hidden');

        if (state === 'numpad') {
          document.getElementById('input-numpad').classList.remove('hidden');
        } else if (state === 'judgment') {
          document.getElementById('input-judgment').classList.remove('hidden');
          document.getElementById('judgment-guess-val').textContent = val;
        } else if (state === 'waiting') {
          document.getElementById('input-waiting').classList.remove('hidden');
        }
      },

      logEntry(msg, type) {
        const log = document.getElementById('battle-log');
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.textContent = msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      },

      shake() {
        const ui = document.getElementById('game-ui');
        ui.classList.remove('shake');
        void ui.offsetWidth; // trigger reflow
        ui.classList.add('shake');
      },

      // Easter Egg Cipher
      eggSeq: [],
      handleEasterEgg(key) {
        this.eggSeq.push(key.toLowerCase());
        if (this.eggSeq.length > 5) this.eggSeq.shift();
        if (this.eggSeq.join('') === 'magic') {
          window.history.replaceState({}, '', '?cipher=unlocked');
          this.logSystem("Cipher Unlocked! You found the secret.");
          this.eggSeq = [];
        }
      },
      logSystem(msg) {
        if (Game.state === 'playing') this.logEntry(msg, 'system');
        else alert(msg);
      },

      // Confetti logic
      showConfetti() {
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        for (let i = 0; i < 100; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 2,
            dx: Math.random() * 4 - 2,
            dy: Math.random() * 5 + 2,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`
          });
        }
        let frame = 0;
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            p.y += p.dy;
            p.x += p.dx;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          });
          frame++;
          if (frame < 200) requestAnimationFrame(animate);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        animate();
      }
    };

    // INIT
    window.onload = () => UI.init();

  </script>
