<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f2027">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ultimate Number Battle</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti"></canvas>
    
    <div class="game-card" id="game-card">
        <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Toggle Sound">🔊</button>
        <div class="emoji-display" id="emoji-display">📱</div>
        <div class="speech-bubble" id="message">Select your mode and AI Algorithm!</div>

        <div class="setup" id="setup-menu">
            <div class="profile-card">
                <div style="display:flex; gap:5px;">
                    <select id="avatar-input" style="width: 25%; margin-bottom:0;" onchange="saveProfile()">
                        <option value="🧑">🧑</option><option value="🐱">🐱</option><option value="🤖">🤖</option><option value="👽">👽</option>
                    </select>
                    <input type="text" id="username-input" style="width: 75%; margin-bottom:0;" placeholder="Your Name" onchange="saveProfile()">
                </div>
                <div class="stats-grid" style="margin-top: 5px;">
                    <div>Local Wins: <span id="stat-local-win">0</span></div>
                    <div>Online Wins: <span id="stat-online-win">0</span></div>
                </div>
            </div>
            
            <select id="game-mode">
                <option value="pve">Mode 1: You Guess Robot's Number</option>
                <option value="reverse">Mode 2: You Judge Robot's Guesses</option>
                <option value="pvp_manual">Mode 3: True PvP (P1 Thinks, P2 Guesses)</option>
            </select>

            <select id="ai-algorithm">
                <option value="easy">Robot Brain: Random (Easy)</option>
                <option value="normal" selected>Robot Brain: Binary (Normal)</option>
                <option value="hard">Robot Brain: Golden Ratio (Hard)</option>
                <option value="expert">Robot Brain: Interpolation (Expert)</option>
            </select>

            <button class="btn-blue" onclick="startGame()">Start Local Game</button>
            <button class="btn-green" onclick="showOnlineLobby()">Play Online (P2P)</button>
        </div>

        <div class="online-lobby" id="online-lobby">
            <button class="btn-blue" onclick="hostOnlineGame()">Create Room</button>
            <div id="room-code-display" style="display:none;">Code:<div class="room-code" id="my-code">----</div></div>
            <hr style="width: 100%; border: 1px solid #e2e8f0; margin: 5px 0;">
            <input type="text" id="join-code" placeholder="Enter 4-Digit Code" maxlength="4">
            <button class="btn-green" onclick="joinOnlineGame()">Join Room</button>
            <button class="btn-gray" onclick="cancelOnline()">Back</button>
        </div>

        <div class="health-section" id="health-section">
            <div class="health-box" id="p1-box"><span id="p1-label">P1</span> (<span id="p1-hp-text"></span>)<div class="health-bar-bg"><div class="health-bar-fill" id="p1-hp-bar"></div></div></div>
            <div class="health-box" id="p2-box"><span id="p2-label">P2</span> (<span id="p2-hp-text"></span>)<div class="health-bar-bg"><div class="health-bar-fill" id="p2-hp-bar"></div></div></div>
        </div>

        <div class="status-board" id="status-board">
            <span>Min: <span id="min-display">1</span></span>
            <span>Max: <span id="max-display">100</span></span>
        </div>

        <div class="battle-log" id="battle-log"></div>

        <div class="controls" id="controls">
            <div id="input-controls" style="display:flex; flex-direction:column;">
                <div class="fake-input" id="user-input-display"></div>
                <div class="numpad">
                    <button onclick="numPress('1')">1</button><button onclick="numPress('2')">2</button><button onclick="numPress('3')">3</button>
                    <button onclick="numPress('4')">4</button><button onclick="numPress('5')">5</button><button onclick="numPress('6')">6</button>
                    <button onclick="numPress('7')">7</button><button onclick="numPress('8')">8</button><button onclick="numPress('9')">9</button>
                    <button class="btn-gray" onclick="numDel()">⌫</button><button onclick="numPress('0')">0</button><button class="btn-red" id="submit-btn" onclick="handleUserGuess()">GUESS</button>
                </div>
            </div>

            <div class="feedback-controls" id="feedback-controls">
                <button class="btn-blue" onclick="manualFeedback('H')">Too High ⬇️</button>
                <button class="btn-blue" onclick="manualFeedback('L')">Too Low ⬆️</button>
                <button class="btn-correct" onclick="manualFeedback('C')">Correct! ✅</button>
            </div>

            <button class="btn-blue" id="menu-btn" style="display:none; margin-top:10px;" onclick="location.reload()">Back to Menu</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    </script>
    <script src="script.js"></script>
</body>
</html>
